// ─── Lógica de clasificación ──────────────────────────────────────────────────

function classifyRisk(caseData) {
  let score = 10;
  if (["Personal", "Personal / laboral"].includes(caseData.data)) score += 35;
  if (caseData.data === "Confidencial") score += 45;
  if (caseData.automation === "Media") score += 15;
  if (caseData.automation === "Alta") score += 30;
  if (caseData.human === "Parcial") score += 15;
  if (caseData.human === "No") score += 30;
  const riskAreas = ["Talento humano / RRHH", "Legal y Compliance", "Finanzas y Contabilidad", "Salud y Bienestar", "Talento humano", "Legal", "Finanzas", "Salud"];
  if (riskAreas.some((a) => caseData.area?.includes(a.split(" ")[0]))) score += 20;
  const bounded = Math.min(100, score);
  const level = bounded >= 80 ? "Crítico" : bounded >= 60 ? "Alto" : bounded >= 35 ? "Medio" : "Bajo";
  return { score: bounded, level };
}

function calculateReadinessScore(org, useCases) {
  const typePenalty = ["Gran corporación", "Sector regulado", "Entidad pública"].includes(org.type) ? 15 : 5;
  const dataPenalty = org.sensitiveData.includes("Sí") ? 20 : 5;
  const maturityBonus = org.maturity.includes("avanzada") ? 20 : org.maturity.includes("intermedio") ? 10 : 0;
  const policyBonus = org.policy.includes("formal") ? 18 : 0;
  const casesPenalty = Math.min(25, useCases.filter((c) => ["Alto", "Crítico"].includes(c.level)).length * 8);
  return Math.max(5, Math.min(100, 55 - typePenalty - dataPenalty - casesPenalty + maturityBonus + policyBonus));
}

function Card({ children, className = "" }) {
  return <div className={`bg-white/90 border border-slate-200 rounded-2xl shadow-sm ${className}`}>{children}</div>;
}

function Badge({ children, className = "" }) {
  return <span className={`inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-medium ${className}`}>{children}</span>;
}

function SectionTitle({ eyebrow, title, subtitle }) {
  return (
    <div className="mb-6">
      {eyebrow && <p className="text-xs uppercase tracking-[0.28em] text-red-700 font-bold mb-2">{eyebrow}</p>}
      <h2 className="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-950">{title}</h2>
      {subtitle && <p className="text-slate-600 mt-2 max-w-3xl leading-relaxed">{subtitle}</p>}
    </div>
  );
}

function Progress({ value, color = "bg-red-700" }) {
  return (
    <div className="w-full h-2 rounded-full bg-slate-100 overflow-hidden">
      <div className={`h-full ${color}`} style={{ width: `${Math.min(100, Math.max(0, value))}%` }} />
    </div>
  );
}

function TextInput({ label, value, onChange, placeholder }) {
  return (
    <label className="block">
      <span className="text-sm font-semibold text-slate-700">{label}</span>
      <input
        className="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-red-700/20 focus:border-red-700"
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
      />
    </label>
  );
}

function Select({ label, value, onChange, options }) {
  return (
    <label className="block">
      <span className="text-sm font-semibold text-slate-700">{label}</span>
      <select
        className="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-red-700/20 focus:border-red-700"
        value={value}
        onChange={(e) => onChange(e.target.value)}
      >
        {options.map((o) => <option key={o} value={o}>{o}</option>)}
      </select>
    </label>
  );
}

function MultiSelect({ label, options, selected, onToggle }) {
  return (
    <div>
      <span className="text-sm font-semibold text-slate-700">{label}</span>
      <div className="mt-2 flex flex-wrap gap-2">
        {options.map((o) => {
          const active = selected.includes(o);
          return (
            <button key={o} onClick={() => onToggle(o)} className={`px-3 py-2 rounded-full border text-xs font-semibold transition ${active ? "bg-red-700 text-white border-red-700" : "bg-white text-slate-700 border-slate-200 hover:border-red-300"}`}>{o}</button>
          );
        })}
      </div>
    </div>
  );
}

function EmptyState({ title, text }) {
  return <div className="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-8 text-center"><p className="font-bold text-slate-800">{title}</p><p className="text-sm text-slate-500 mt-1">{text}</p></div>;
}

            <p className="text-xs uppercase tracking-widest text-slate-500 font-bold">{c.label}</p>
            <p className="text-3xl font-extrabold text-slate-950 mt-2">{c.value}</p>
            <p className="text-sm text-slate-500 mt-1">{c.hint}</p>
            <div className={`h-1.5 rounded-full mt-4 ${c.color}`} />
          </Card>
        ))}
      </div>

      <div className="grid lg:grid-cols-3 gap-6">
        <Card className="p-6 lg:col-span-2">
          <SectionTitle title="Mapa rápido de riesgos" subtitle="Distribución de casos de uso registrados por nivel de riesgo." />
          {useCases.length ? (
            <div className="space-y-4">
              {["Bajo", "Medio", "Alto", "Crítico"].map((level) => {
                const count = useCases.filter((c) => c.level === level).length;
                const pct = useCases.length ? (count / useCases.length) * 100 : 0;
                return <div key={level}><div className="flex justify-between text-sm mb-1"><span className="font-bold">{level}</span><span>{count}</span></div><Progress value={pct} color={riskRules[level].bar} /></div>;
              })}
            </div>
          ) : <EmptyState title="Sin casos registrados" text="Agrega casos de uso para ver el mapa de riesgos." />}
        </Card>
        <Card className="p-6">
          <SectionTitle title="Siguientes acciones" subtitle="Prioridades recomendadas." />
          <div className="space-y-3 text-sm">
            <button onClick={() => setActive("inventario")} className="w-full text-left rounded-xl border border-slate-200 p-4 hover:border-red-300"><strong>1. Inventariar herramientas</strong><br/><span className="text-slate-500">Define cuáles están aprobadas.</span></button>
            <button onClick={() => setActive("casos")} className="w-full text-left rounded-xl border border-slate-200 p-4 hover:border-red-300"><strong>2. Registrar casos de uso</strong><br/><span className="text-slate-500">Mapea datos y automatización.</span></button>
            <button onClick={() => setActive("documentos")} className="w-full text-left rounded-xl border border-slate-200 p-4 hover:border-red-300"><strong>3. Generar anexos</strong><br/><span className="text-slate-500">Crea checklist y protocolos.</span></button>
          </div>
        </Card>
      </div>
    </div>
  );
}

function Diagnostic({ org, setOrg }) {
  const toggleTool = (tool) => setOrg({ ...org, tools: org.tools.includes(tool) ? org.tools.filter((t) => t !== tool) : [...org.tools, tool] });
  return (
    <div>
      <SectionTitle eyebrow="Diagnóstico" title="Configura tu organización" subtitle="Esta información adapta la política, el nivel de controles y los documentos generados." />
      <Card className="p-6">
        <div className="grid md:grid-cols-2 gap-5">
          <TextInput label="Nombre de la organización" value={org.name} onChange={(v) => setOrg({ ...org, name: v })} placeholder="Ej. Empresa FuturIA" />
          <Select label="Tipo de organización" value={org.type} onChange={(v) => setOrg({ ...org, type: v })} options={orgTypes} />
          <Select label="Sector principal" value={org.sector} onChange={(v) => setOrg({ ...org, sector: v })} options={sectors} />
          <Select label="¿Procesa datos sensibles?" value={org.sensitiveData} onChange={(v) => setOrg({ ...org, sensitiveData: v })} options={["No / casi nunca", "Sí, ocasionalmente", "Sí, de forma frecuente"]} />
          <Select label="Madurez en IA" value={org.maturity} onChange={(v) => setOrg({ ...org, maturity: v })} options={["Inicial / exploratoria", "Uso intermedio", "Adopción avanzada"]} />
          <Select label="Política actual de IA" value={org.policy} onChange={(v) => setOrg({ ...org, policy: v })} options={["No existe", "Hay reglas informales", "Existe política formal"]} />
        </div>
        <div className="mt-6"><MultiSelect label="Herramientas utilizadas" options={tools} selected={org.tools} onToggle={toggleTool} /></div>
      </Card>
    </div>
  );
}

function Inventory({ toolsInventory, setToolsInventory }) {
  const [tool, setTool] = useState("ChatGPT");
  const [owner, setOwner] = useState("Marketing y Comunicación");
  const [status, setStatus] = useState("Pendiente");
  const [dataLevel, setDataLevel] = useState("Interno");

  const addTool = () => {
    setToolsInventory([...toolsInventory, { id: Date.now(), tool, owner, status, dataLevel }]);
  };

  return (
    <div>
      <SectionTitle eyebrow="Inventario" title="Herramientas de IA" subtitle="Registra qué herramientas se usan, quién responde por ellas y qué tipo de datos pueden procesar." />
      <Card className="p-6 mb-6">
        <div className="grid md:grid-cols-5 gap-4 items-end">
          <Select label="Herramienta" value={tool} onChange={setTool} options={tools} />
          <Select label="Área responsable" value={owner} onChange={setOwner} options={areaOptions} />
          <Select label="Estado" value={status} onChange={setStatus} options={["Aprobada", "Pendiente", "Prohibida"]} />
          <Select label="Datos permitidos" value={dataLevel} onChange={setDataLevel} options={["Público", "Interno", "Personal", "Confidencial", "Crítico"]} />
          <button onClick={addTool} className="rounded-xl bg-red-700 text-white px-5 py-3 text-sm font-bold hover:bg-red-800">Agregar</button>
        </div>
      </Card>
      <Card className="overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-600"><tr><th className="p-4 text-left">Herramienta</th><th className="p-4 text-left">Área</th><th className="p-4 text-left">Estado</th><th className="p-4 text-left">Datos</th><th></th></tr></thead>
          <tbody>
            {toolsInventory.map((t) => <tr key={t.id} className="border-t"><td className="p-4 font-bold">{t.tool}</td><td className="p-4">{t.owner}</td><td className="p-4"><Badge className={t.status === "Aprobada" ? "border-emerald-200 bg-emerald-50 text-emerald-700" : t.status === "Prohibida" ? "border-red-200 bg-red-50 text-red-700" : "border-amber-200 bg-amber-50 text-amber-700"}>{t.status}</Badge></td><td className="p-4">{t.dataLevel}</td><td className="p-4 text-right"><button onClick={() => setToolsInventory(toolsInventory.filter((x) => x.id !== t.id))} className="text-red-700 font-bold">Eliminar</button></td></tr>)}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

function GPTLibrary({ setUseCases }) {
  const [query, setQuery] = useState("");
  const [category, setCategory] = useState("Todas");
  const categories = ["Todas", ...Array.from(new Set(GPT_LIBRARY.map((g) => g.category)))];
  const filtered = GPT_LIBRARY.filter((g) => (category === "Todas" || g.category === category) && `${g.name} ${g.purpose} ${g.area}`.toLowerCase().includes(query.toLowerCase()));

  const addAsUseCase = (g) => {
    const base = { name: g.name, area: g.area, data: g.dataLevel === "Público" ? "Pública" : g.dataLevel === "Personal" ? "Personal" : g.dataLevel === "Confidencial" ? "Confidencial" : "No sensible", automation: "Media", human: "Sí" };
    const { score, level } = classifyRisk(base);
    setUseCases((prev) => [...prev, { id: Date.now(), ...base, score, level }]);
  };

  return (
    <div className="space-y-6">
      <SectionTitle eyebrow="Biblioteca" title="100 GPTs y asistentes internos por área" subtitle="Explora ideas de asistentes internos y agrégalas como casos de uso para clasificarlas." />
      <Card className="p-5">
        <div className="grid md:grid-cols-3 gap-4">
          <TextInput label="Buscar" value={query} onChange={setQuery} placeholder="Ej. contratos, ventas, RRHH" />
          <Select label="Categoría" value={category} onChange={setCategory} options={categories} />
          <div className="flex items-end"><p className="text-sm text-slate-500"><strong>{filtered.length}</strong> resultados</p></div>
        </div>
      </Card>
      <div className="grid md:grid-cols-2 gap-4">
        {filtered.map((g) => (
          <Card key={g.name} className="p-5">
            <div className="flex justify-between gap-3"><Badge className="border-slate-200 bg-slate-50 text-slate-700">{g.category}</Badge><Badge className={riskRules[g.riskLevel]?.badge || "border-slate-200"}>{g.riskLevel}</Badge></div>
            <h3 className="font-extrabold text-slate-950 mt-3">{g.name}</h3>
            <p className="text-sm text-slate-600 mt-2 leading-relaxed">{g.purpose}</p>
            <div className="mt-4 grid grid-cols-2 gap-2 text-xs text-slate-500">
              <p><strong>Área:</strong> {g.area}</p><p><strong>Plataforma:</strong> {g.platform}</p><p><strong>Datos:</strong> {g.dataLevel}</p><p><strong>Acceso:</strong> {g.access}</p>
            </div>
            <button onClick={() => addAsUseCase(g)} className="mt-4 rounded-xl bg-red-700 text-white px-4 py-2 text-sm font-bold hover:bg-red-800">Agregar a casos</button>
          </Card>
        ))}
      </div>
    </div>
  );
}

function UseCases({ useCases, setUseCases }) {
  const [form, setForm] = useState({ name: "", area: "Marketing y Comunicación", data: "No sensible", automation: "Baja", human: "Sí" });
  const add = () => {
    if (!form.name.trim()) return;
    const r = classifyRisk(form);
    setUseCases([...useCases, { id: Date.now(), ...form, ...r }]);
    setForm({ ...form, name: "" });
  };
  return (
    <div>
      <SectionTitle eyebrow="Casos de uso" title="Registro y clasificación inicial" subtitle="Añade casos reales. El sistema estima riesgo con base en datos, automatización, supervisión y área." />
      <Card className="p-6 mb-6">
        <div className="grid md:grid-cols-3 gap-4">
          <TextInput label="Nombre del caso" value={form.name} onChange={(v) => setForm({ ...form, name: v })} placeholder="Ej. Responder tickets con IA" />
          <Select label="Área" value={form.area} onChange={(v) => setForm({ ...form, area: v })} options={areaOptions} />
          <Select label="Tipo de datos" value={form.data} onChange={(v) => setForm({ ...form, data: v })} options={["Pública", "No sensible", "Interno", "Personal", "Personal / laboral", "Confidencial"]} />
          <Select label="Automatización" value={form.automation} onChange={(v) => setForm({ ...form, automation: v })} options={["Baja", "Media", "Alta"]} />
          <Select label="Supervisión humana" value={form.human} onChange={(v) => setForm({ ...form, human: v })} options={["Sí", "Parcial", "No"]} />
          <div className="flex items-end"><button onClick={add} className="w-full rounded-xl bg-red-700 text-white px-5 py-3 text-sm font-bold hover:bg-red-800">Agregar caso</button></div>
        </div>
      </Card>
      <div className="space-y-3">
        {useCases.map((c) => <Card key={c.id} className="p-5"><div className="flex flex-col md:flex-row md:items-center justify-between gap-4"><div><h3 className="font-extrabold text-slate-950">{c.name}</h3><p className="text-sm text-slate-500 mt-1">{c.area} · Datos: {c.data} · Automatización: {c.automation} · Humano: {c.human}</p></div><div className="flex items-center gap-3"><Badge className={riskRules[c.level].badge}>{c.level}</Badge><span className="font-black text-slate-900">{c.score}/100</span><button onClick={() => setUseCases(useCases.filter((x) => x.id !== c.id))} className="text-red-700 text-sm font-bold">Eliminar</button></div></div></Card>)}
      </div>
    </div>
  );
}

function RiskClassifier({ useCases }) {
  return (
    <div>
      <SectionTitle eyebrow="Riesgos" title="Clasificador de riesgos" subtitle="Vista ejecutiva de controles, criterios y aprobaciones sugeridas por nivel." />
      <div className="grid md:grid-cols-2 gap-4 mb-6">
        {Object.values(riskRules).map((r) => <Card key={r.label} className="p-5"><Badge className={r.badge}>{r.label}</Badge><h3 className="font-extrabold text-slate-950 mt-3">Criterios</h3><p className="text-sm text-slate-600 mt-1">{r.criteria}</p><h3 className="font-extrabold text-slate-950 mt-4">Controles</h3><p className="text-sm text-slate-600 mt-1">{r.controls}</p><h3 className="font-extrabold text-slate-950 mt-4">Aprobación</h3><p className="text-sm text-slate-600 mt-1">{r.approval}</p></Card>)}
      </div>
      <Card className="p-6">
        <h3 className="font-extrabold text-slate-950 mb-4">Casos actuales</h3>
        {useCases.length ? <div className="space-y-3">{useCases.map((c) => <div key={c.id} className="flex justify-between items-center border-b pb-3"><div><p className="font-bold">{c.name}</p><p className="text-sm text-slate-500">{c.area}</p></div><Badge className={riskRules[c.level].badge}>{c.level}</Badge></div>)}</div> : <EmptyState title="Sin casos" text="Agrega casos para clasificarlos." />}
      </Card>
    </div>
  );
}

function Policy({ org, useCases }) {
  const policy = useMemo(() => buildPolicy(org), [org, useCases]);
  const copy = () => navigator.clipboard?.writeText(policy);
  const download = () => {
    const blob = new Blob([policy], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `politica-ia-${(org.name || "organizacion").toLowerCase().replace(/\s+/g, "-")}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  };
  return (
    <div>
      <SectionTitle eyebrow="Política" title="Borrador de política de IA" subtitle="Documento base adaptado a tu tipo de organización. Revísalo antes de adoptarlo formalmente." />
      <div className="flex gap-2 mb-4"><button onClick={copy} className="rounded-xl bg-slate-950 text-white px-4 py-2 text-sm font-bold">Copiar</button><button onClick={download} className="rounded-xl bg-red-700 text-white px-4 py-2 text-sm font-bold">Descargar TXT</button></div>
      <Card className="p-6"><pre className="whitespace-pre-wrap text-sm leading-relaxed text-slate-800 font-sans">{policy}</pre></Card>
    </div>
  );
}

function Documents({ org, useCases }) {
  const [selected, setSelected] = useState(docTypes[0]);
  const doc = useMemo(() => generateDocument(selected, org, useCases), [selected, org, useCases]);
  const copy = () => navigator.clipboard?.writeText(doc);
  const download = () => {
    const blob = new Blob([doc], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${selected.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "-")}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  };
  return (
    <div>
      <SectionTitle eyebrow="Documentos" title="Documentos y anexos" subtitle="Genera borradores complementarios para implementar la política." />
      <Card className="p-6 mb-4"><Select label="Tipo de documento" value={selected} onChange={setSelected} options={docTypes} /></Card>
      <div className="flex gap-2 mb-4"><button onClick={copy} className="rounded-xl bg-slate-950 text-white px-4 py-2 text-sm font-bold">Copiar</button><button onClick={download} className="rounded-xl bg-red-700 text-white px-4 py-2 text-sm font-bold">Descargar TXT</button></div>
      <Card className="p-6"><pre className="whitespace-pre-wrap text-sm leading-relaxed text-slate-800 font-sans">{doc}</pre></Card>
    </div>
  );
}

function DataPolicyPlaceholder() {
  return <Placeholder title="Política de datos para IA" text="Módulo V2 para clasificar datos, definir reglas de uso por nivel y generar anexos de privacidad." />;
}
function InternalGPTsPlaceholder() {
  return <Placeholder title="GPTs internos" text="Módulo V2 para registrar GPTs, responsables, datos permitidos, accesos y fechas de revisión." />;
}
function RolesPlaceholder() {
  return <Placeholder title="Roles y comité de IA" text="Módulo V2 para definir CAIO, comité, AI Champions, responsables de área y flujos de aprobación." />;
}
function ApprovalsPlaceholder() {
  return <Placeholder title="Flujos de aprobación" text="Módulo V2 para solicitar, aprobar, rechazar y auditar casos de uso de IA." />;
}
function IncidentsPlaceholder() {
  return <Placeholder title="Incidentes de IA" text="Módulo V2 para registrar errores, filtraciones, usos indebidos, sesgos y acciones correctivas." />;
}
function CompliancePlaceholder() {
  return <Placeholder title="Panel de cumplimiento" text="Módulo V2 para medir cobertura de política, formación, herramientas aprobadas y casos pendientes." />;
}
function Placeholder({ title, text }) {
  return <Card className="p-8"><Badge className="border-red-200 bg-red-50 text-red-700">Próxima versión</Badge><h2 className="text-3xl font-extrabold mt-4 text-slate-950">{title}</h2><p className="text-slate-600 mt-3 max-w-2xl">{text}</p></Card>;
}

function App() {
  const [active, setActive] = useState("comoUsar");
  const [org, setOrg] = useState({ name: "", type: "Pyme", sector: "Servicios profesionales", sensitiveData: "Sí, ocasionalmente", maturity: "Inicial / exploratoria", policy: "No existe", tools: ["ChatGPT", "Claude"] });
  const [toolsInventory, setToolsInventory] = useState([
    { id: 1, tool: "ChatGPT", owner: "Marketing y Comunicación", status: "Pendiente", dataLevel: "Interno" },
    { id: 2, tool: "Claude", owner: "Legal y Compliance", status: "Pendiente", dataLevel: "Confidencial" },
  ]);
  const [useCases, setUseCases] = useState(sampleUseCases);

  useEffect(() => {
    try {
      localStorage.setItem("futuria-governance", JSON.stringify({ org, toolsInventory, useCases }));
    } catch {}
  }, [org, toolsInventory, useCases]);

  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("futuria-governance") || "null");
      if (saved) { setOrg(saved.org || org); setToolsInventory(saved.toolsInventory || toolsInventory); setUseCases(saved.useCases || sampleUseCases); }
    } catch {}
  }, []);

  const allModules = [...mvpModules, ...v2Modules];
  const render = () => {
    switch (active) {
      case "comoUsar": return <HowToUse setActive={setActive} />;
      case "dashboard": return <Dashboard org={org} useCases={useCases} toolsInventory={toolsInventory} setActive={setActive} />;
      case "diagnostico": return <Diagnostic org={org} setOrg={setOrg} />;
      case "inventario": return <Inventory toolsInventory={toolsInventory} setToolsInventory={setToolsInventory} />;
      case "casos": return <UseCases useCases={useCases} setUseCases={setUseCases} />;
      case "riesgos": return <RiskClassifier useCases={useCases} />;
      case "politica": return <Policy org={org} useCases={useCases} />;
      case "documentos": return <Documents org={org} useCases={useCases} />;
      case "gpts": return <GPTLibrary setUseCases={setUseCases} />;
      case "datosPolitica": return <DataPolicyPlaceholder />;
      case "roles": return <RolesPlaceholder />;
      case "aprobaciones": return <ApprovalsPlaceholder />;
      case "incidentes": return <IncidentsPlaceholder />;
      case "cumplimiento": return <CompliancePlaceholder />;
      default: return <Dashboard org={org} useCases={useCases} toolsInventory={toolsInventory} setActive={setActive} />;
    }
  };

  return (
    <div className="min-h-screen bg-slate-50 text-slate-900">
      <div className="flex flex-col lg:flex-row min-h-screen">
        <aside className="lg:w-72 bg-white border-r border-slate-200 p-4 lg:fixed lg:h-screen lg:overflow-y-auto">
          <div className="flex items-center gap-3 mb-6">
            <div className="w-10 h-10 rounded-2xl bg-red-700 text-white flex items-center justify-center font-black">F</div>
            <div><p className="font-black text-slate-950">FuturIA</p><p className="text-xs text-slate-500">Governance Builder</p></div>
          </div>
          <nav className="space-y-1">
            {allModules.map((m) => (
              <button key={m.id} onClick={() => setActive(m.id)} className={`w-full flex items-center justify-between rounded-xl px-3 py-2 text-sm font-semibold transition ${active === m.id ? "bg-red-700 text-white" : "text-slate-600 hover:bg-slate-100"}`}>
                <span className="flex items-center gap-2"><span>{m.icon || "○"}</span>{m.label}</span>
                {!m.noBadge && v2Modules.some((x) => x.id === m.id) && <span className="text-[10px] px-2 py-0.5 rounded-full bg-white/20">V2</span>}
              </button>
            ))}
          </nav>
          <div className="mt-6 p-4 rounded-2xl bg-slate-950 text-white">
            <p className="text-xs uppercase tracking-widest text-red-300 font-bold">Aviso</p>
            <p className="text-sm mt-2 text-slate-200">Los documentos son borradores. Requieren revisión profesional antes de adopción oficial.</p>
          </div>
        </aside>
        <main className="flex-1 lg:ml-72 p-4 md:p-8">
          {render()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
