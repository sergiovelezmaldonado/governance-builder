// ─── Lógica de clasificación ──────────────────────────────────────────────────

function classifyRisk(caseData) {
  let score = 10;
  if (["Personal", "Personal / laboral"].includes(caseData.data)) score += 35;
  if (caseData.data === "Confidencial") score += 45;
  if (caseData.automation === "Media") score += 15;
  if (caseData.automation === "Alta") score += 30;
  if (caseData.human === "Parcial") score += 15;
  if (caseData.human === "No") score += 30;
  const riskAreas = ["Talento humano / RRHH", "Legal y Compliance", "Finanzas y Contabilidad", "Salud y Bienestar", "Talento humano", "Legal", "Finanzas", "Salud"];
  if (riskAreas.some((a) => caseData.area?.includes(a.split(" ")[0]))) score += 20;
  const bounded = Math.min(100, score);
  const level = bounded >= 80 ? "Crítico" : bounded >= 60 ? "Alto" : bounded >= 35 ? "Medio" : "Bajo";
  return { score: bounded, level };
}

function calculateReadinessScore(org, useCases) {
  const typePenalty = ["Gran corporación", "Sector regulado", "Entidad pública"].includes(org.type) ? 15 : 5;
  const dataPenalty = org.sensitiveData.includes("Sí") ? 20 : 5;
  const maturityBonus = org.maturity.includes("avanzada") ? 20 : org.maturity.includes("intermedio") ? 10 : 0;
  const policyBonus = org.policy.includes("formal") ? 18 : 0;
  const casesPenalty = Math.min(25, useCases.filter((c) => ["Alto", "Crítico"].includes(c.level)).length * 8);
  return Math.max(5, Math.min(100, 55 - typePenalty - dataPenalty - casesPenalty + maturityBonus + policyBonus));
}

function buildProtocoloIncidentes(org) {
  const name = org.name || "la organización";

  const isRegulated = ["Gran corporación", "Sector regulado", "Entidad pública"].includes(org.type);
  return `PROTOCOLO DE GESTIÓN DE INCIDENTES DE IA
${name} | Versión: 1.0 | Fecha: ${today}
─────────────────────────────────────────────────────

ALCANCE: aplica a cualquier evento relacionado con el uso de IA que cause o pueda causar daño, violación de privacidad, error crítico, sesgo relevante, uso indebido o impacto reputacional.

TIPOS DE INCIDENTE
  MENOR: error de output sin consecuencias significativas, uso no autorizado de herramienta de bajo riesgo.
  SIGNIFICATIVO: output incorrecto distribuido externamente, uso no autorizado con datos internos.
  GRAVE: fuga de datos personales o confidenciales, decisión automatizada incorrecta con impacto real en personas.
  CRÍTICO: brecha masiva de seguridad, uso de IA para actividades fraudulentas o discriminatorias.

  - Detener el uso de la herramienta o sistema involucrado si el incidente es grave o crítico.

  [ ] Significativo → notificación a dirección y medidas correctivas documentadas.

  - Identificar causa raíz: ¿qué falló y por qué?

PASO 5 — REMEDIACIÓN
  - Implementar correcciones técnicas y de proceso.

1. CLASIFICACIÓN DE DATOS EN ${name.toUpperCase()}

NIVEL 1 — DATOS PÚBLICOS (sin restricción de herramienta)
  Ejemplos: información publicada en web, noticias, normativa pública, datos de dominio público.
  Regla: puedes usarlos con cualquier herramienta de IA aprobada.

NIVEL 2 — DATOS INTERNOS (solo herramientas aprobadas)
  Ejemplos: comunicaciones internas, procesos operativos, documentos de trabajo no confidenciales.

  Ejemplos: estrategia comercial, información financiera, contratos, datos de proveedores bajo NDA.

1.1 PROTECCIÓN DE DATOS
  Los principales marcos de referencia para el tratamiento de datos personales con IA son:
  - Unión Europea: Reglamento General de Protección de Datos (RGPD / GDPR).
  - Latinoamérica: legislaciones nacionales aplicables (LGPD en Brasil, Ley de Datos en Colombia, leyes locales).
  - Otros: leyes sectoriales sobre privacidad financiera, salud, telecomunicaciones.

  Obligaciones clave al usar IA con datos personales:
  → Base legal para el tratamiento (consentimiento, interés legítimo, contrato, etc.)
  → Principios de minimización, propósito y exactitud.
  → Derecho de los interesados: acceso, rectificación, supresión, portabilidad, objeción.
  → Notificación de brechas a la autoridad en plazos legales (72h en RGPD).

  El EU AI Act (vigente desde 2024) clasifica sistemas de IA en:
  - Riesgo inaceptable: prohibidos (manipulación subliminal, reconocimiento biométrico masivo).
  - Alto riesgo: regulados con evaluación previa (RRHH, crédito, educación, servicios públicos).
  - Limitado riesgo: obligaciones de transparencia (chatbots, deepfakes).
  - Riesgo mínimo: sin regulación específica.

2.2 PROPIEDAD INTELECTUAL DE OUTPUTS
  El régimen jurídico de los outputs de IA es incierto en muchas jurisdicciones:

  switch(docName) {

    case "Registro de herramientas aprobadas": return buildRegistroHerramientasAprobadas(org);
    case "Registro de herramientas prohibidas": return buildRegistroHerramientasProhibidas(org);
    case "Registro de GPTs internos": return buildRegistroGPTs(org);
    case "Formulario de solicitud de nuevo caso de uso": return buildFormularioSolicitud(org);

    case "Protocolo de incidentes": return buildProtocoloIncidentes(org);
    case "Checklist de revisión humana": return buildChecklist(org);
    case "Guía de uso de datos": return buildGuiaDatos(org);
    case "Guía de prompts seguros": return buildGuiaPrompts(org);
    case "Política de proveedores de IA": return buildPoliticaProveedores(org);
    case "Roadmap de implementación": return buildRoadmap(org, useCases);
    case "Plan de formación interna": return buildPlanFormacion(org);
    case "Informe ejecutivo para dirección": return buildInformeEjecutivo(org, useCases);
    case "Anexo legal y de compliance": return buildAnexoLegal(org);

function escapeHtml(v) {
  return String(v)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function cn(...classes) { return classes.filter(Boolean).join(" "); }

function downloadAsWord(content, filename) {
  const html = `<!doctype html><html><head><meta charset="utf-8"><title>${escapeHtml(filename)}</title></head><body><pre style="font-family:Arial;white-space:pre-wrap;line-height:1.6;max-width:800px;margin:40px auto">${escapeHtml(content)}</pre></body></html>`;
  const blob = new Blob(["﻿", html], { type: "application/msword" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename + ".doc";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function App() {
  const stored = loadFromStorage();

  const [active, setActive] = useState("comoUsar");
  const [aboutOpen, setAboutOpen] = useState(false);
  const [exportModal, setExportModal] = useState(null);
  const [confirmModal, setConfirmModal] = useState(null);
  const [successMsg, setSuccessMsg] = useState("");
  const [errorMsg, setErrorMsg] = useState("");
  const importInputRef = useRef(null);
  const [caseSearch, setCaseSearch] = useState("");
  const [savedAt, setSavedAt] = useState(null);
  const [simOrgType, setSimOrgType] = useState("Pyme");
  const [docViewer, setDocViewer] = useState(null); // { name, content }

  const [org, setOrg] = useState(stored?.org || defaultOrg);
  const [useCases, setUseCases] = useState(stored?.useCases || []);
  const [newCase, setNewCase] = useState({ name: "", area: areaOptions[0], data: "Pública", automation: "Baja", human: "Sí" });
  const [editingCaseId, setEditingCaseId] = useState(null);

  const [gpts, setGpts] = useState(stored?.gpts || []);
  const [roles, setRoles] = useState(stored?.roles || defaultRoles);
  const [incidents, setIncidents] = useState(stored?.incidents || []);
  const [dataPolicy, setDataPolicy] = useState(stored?.dataPolicy || { notas: "" });
  const [newGpt, setNewGpt] = useState({ name: "", platform: "ChatGPT", purpose: "", area: areaOptions[0], access: "Solo creador", dataLevel: "Público", riskLevel: "Bajo" });
  const [showGptLibrary, setShowGptLibrary] = useState(false);
  const [gptLibrarySearch, setGptLibrarySearch] = useState("");
  const [newIncident, setNewIncident] = useState({ desc: "", tool: "", data: "No aplica", severity: "Menor", status: "Detectado", date: new Date().toLocaleDateString("es-ES") });

  useEffect(() => {
    saveToStorage({ org, useCases, gpts, roles, incidents, dataPolicy });
    setSavedAt(new Date().toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" }));
  }, [org, useCases, gpts, roles, incidents, dataPolicy]);

  const score = useMemo(() => calculateReadinessScore(org, useCases), [org, useCases]);
  const generatedPolicy = useMemo(() => buildPolicy(org), [org]);
  const filteredLibrary = useMemo(() => {
    const q = gptLibrarySearch.toLowerCase().trim();
    if (!q) return GPT_LIBRARY;
    return GPT_LIBRARY.filter(g =>
      g.name.toLowerCase().includes(q) ||
      g.category.toLowerCase().includes(q) ||
      g.purpose.toLowerCase().includes(q) ||
      g.area.toLowerCase().includes(q)
    );
  }, [gptLibrarySearch]);

  const readinessLabel = score >= 75 ? "Sólida" : score >= 50 ? "En construcción" : score >= 30 ? "Frágil" : "Crítica";
  const highRiskCount = useCases.filter((c) => ["Alto", "Crítico"].includes(c.level)).length;

  function showSuccess(msg) { setSuccessMsg(msg); setTimeout(() => setSuccessMsg(""), 3500); }
  function showError(msg) { setErrorMsg(msg); setTimeout(() => setErrorMsg(""), 4500); }

  function addCase() {
    if (!newCase.name.trim()) return;
    const risk = classifyRisk(newCase);
    setUseCases((prev) => [...prev, { id: Date.now(), ...newCase, ...risk }]);
    setNewCase({ name: "", area: areaOptions[0], data: "Pública", automation: "Baja", human: "Sí" });
    showSuccess("Caso de uso registrado y clasificado correctamente.");
  }

  function startEditCase(id) {
    const c = useCases.find((c) => c.id === id);
    if (!c) return;
    setNewCase({ name: c.name, area: c.area, data: c.data, automation: c.automation, human: c.human });
    setEditingCaseId(id);
  }

  function updateCase() {
    if (!newCase.name.trim()) return;
    const risk = classifyRisk(newCase);
    setUseCases((prev) => prev.map((c) => c.id === editingCaseId ? { ...c, ...newCase, ...risk } : c));
    setNewCase({ name: "", area: areaOptions[0], data: "Pública", automation: "Baja", human: "Sí" });
    setEditingCaseId(null);
    showSuccess("Caso de uso actualizado correctamente.");
  }

  function cancelEditCase() {
    setNewCase({ name: "", area: areaOptions[0], data: "Pública", automation: "Baja", human: "Sí" });
    setEditingCaseId(null);
  }

  function deleteCase(id) {
    setConfirmModal({
      title: "¿Eliminar este caso de uso?",
      message: "Se eliminará permanentemente. Esta acción no se puede deshacer.",
      onConfirm: () => { setUseCases((prev) => prev.filter((c) => c.id !== id)); setConfirmModal(null); showSuccess("Caso de uso eliminado."); },
    });

  function exportData() {

    const a = document.createElement("a");
    const slug = (org.name || "mi-organizacion").toLowerCase().replace(/\s+/g, "-");
    a.href = url; a.download = `gobernanza-ia-${slug}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    showSuccess("Respaldo JSON descargado.");
  }

  function importData(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      let d;
      try { d = JSON.parse(reader.result); } catch { showError("El archivo no es un JSON válido."); return; }
      if (!d || typeof d !== "object" || !d.org || typeof d.org !== "object") { showError("El archivo no es un respaldo del Governance Builder."); return; }
      setConfirmModal({
        title: "¿Importar respaldo?",
        message: "Esto reemplazará todos los datos actuales con los del archivo importado.",
        onConfirm: () => {
          setOrg({ ...emptyOrg, ...d.org });
          setUseCases(Array.isArray(d.useCases) ? d.useCases : []);
          setGpts(Array.isArray(d.gpts) ? d.gpts : []);
          setRoles(d.roles && typeof d.roles === "object" ? { ...defaultRoles, ...d.roles } : defaultRoles);
          setIncidents(Array.isArray(d.incidents) ? d.incidents : []);
          setDataPolicy(d.dataPolicy && typeof d.dataPolicy === "object" ? d.dataPolicy : { notas: "" });
          setConfirmModal(null);
          showSuccess("Respaldo importado correctamente.");
        },
      });
    };
    reader.onerror = () => showError("No se pudo leer el archivo.");
    reader.readAsText(file);
  }

                  <div className="p-5">
                    <p className="font-semibold text-emerald-800">✓ Responsable de IA definido</p>
                    <p className="text-sm text-emerald-700">{roles.responsable}{roles.cargo ? ` — ${roles.cargo}` : ""}{roles.email ? ` · ${roles.email}` : ""}</p>
                  </div>
                </Card>
              )}
              <div className="mt-5 flex items-center justify-between rounded-[24px] border border-[#e5e5e5] bg-[#fafafa] p-5">
                <div>
                  <p className="font-semibold text-[#222222]">¿Tienes la estructura de roles definida?</p>
                  <p className="text-sm text-[#555555]">El siguiente módulo define quién aprueba qué según el nivel de riesgo.</p>
                </div>
                <AppButton onClick={() => setActive("aprobaciones")}>Continuar a flujos de aprobación →</AppButton>
              </div>
            </Section>
          )}

          {/* ── FLUJOS DE APROBACIÓN ──────────────────────────── */}
          {active === "aprobaciones" && (
            <Section title="Flujos de aprobación" subtitle="Define quién tiene autoridad para aprobar cada nivel de riesgo y en qué plazos.">
              <InfoBlock
                icon="◮"
                what="La estructura de autorización que define quién puede aprobar un nuevo uso de IA según su nivel de riesgo, desde el responsable de área hasta el comité."
                why="Sin flujos claros, los riesgos altos se aprueban por inercia o por urgencia. El flujo convierte el nivel de riesgo en una acción concreta con un responsable real."
                how="Personaliza los responsables de aprobación para cada nivel. Genera el formulario de solicitud para que tu equipo lo use al proponer nuevos casos de uso."
              />
              <div className="grid gap-4 xl:grid-cols-2">
                {Object.values(riskRules).map((risk) => (
                  <Card key={risk.label}>
                    <div className="p-5">
                      <div className="mb-3 flex items-center gap-2">
                        <Badge className={risk.badge}>{risk.label}</Badge>
                      </div>
                      <p className="mb-4 text-sm text-[#555555]">{risk.criteria}</p>
                      <div className="grid gap-3">
                        <div className="rounded-2xl bg-[#fafafa] p-3 text-sm">
                          <p className="text-xs font-semibold text-[#757575] mb-1">Aprobación estándar recomendada</p>
                          <p className="text-[#333333]">{risk.approval}</p>
                        </div>
                        <Field label="Responsable en tu organización">
                          <TextInput
                            value={roles["aprobacion_" + risk.label] || ""}
                            onChange={(e) => setRoles((r) => ({ ...r, ["aprobacion_" + risk.label]: e.target.value }))}
                            placeholder={risk.label === "Bajo" ? "Ej. Líder de área" : risk.label === "Medio" ? "Ej. Gerente + Responsable de IA" : risk.label === "Alto" ? "Ej. Comité de IA" : "Ej. Alta dirección + Legal"}
                          />
                        </Field>
                        <Field label="Plazo máximo de respuesta">
                          <SelectInput
                            value={roles["plazo_" + risk.label] || (risk.label === "Bajo" ? "48 horas" : risk.label === "Medio" ? "5 días" : "10 días")}
                            onChange={(e) => setRoles((r) => ({ ...r, ["plazo_" + risk.label]: e.target.value }))}>
                            {["24 horas", "48 horas", "5 días", "10 días", "15 días"].map((p) => <option key={p}>{p}</option>)}
                          </SelectInput>
                        </Field>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
              <div className="mt-5 flex flex-wrap items-center justify-between gap-3 rounded-[24px] border border-[#e5e5e5] bg-[#fafafa] p-5">
                <div>
                  <p className="font-semibold text-[#222222]">¿Tienes los flujos definidos?</p>
                  <p className="text-sm text-[#555555]">Genera el formulario de solicitud para que tu equipo lo use al proponer nuevos casos de uso.</p>
                </div>
                <div className="flex flex-wrap gap-3">
                  <AppButton variant="secondary" onClick={() => openDocViewer("Formulario de evaluación de impacto")}>Evaluación de impacto</AppButton>
                  <AppButton onClick={() => openDocViewer("Formulario de solicitud de nuevo caso de uso")}>Formulario de solicitud →</AppButton>
                </div>
              </div>
            </Section>
          )}

          {/* ── INCIDENTES ────────────────────────────────────── */}
          {active === "incidentes" && (
            <Section title="Registro de incidentes" subtitle="Documenta y gestiona los incidentes relacionados con el uso de IA en tu organización.">
              <InfoBlock
                icon="◬"
                what="Un registro estructurado de incidentes de IA: desde errores de output hasta fugas de datos, con severidad, estado y seguimiento."
                why="Registrar incidentes convierte los errores en aprendizaje institucional. Las organizaciones que documentan mejoran su gobernanza más rápido que las que ocultan los problemas."
                how="Registra cualquier evento relacionado con IA que haya causado o pudiera causar daño. Asigna severidad y estado. Genera el protocolo completo para tu equipo."
              />
              <div className="grid gap-5 xl:grid-cols-[0.9fr_1.1fr]">
                <Card>
                  <div className="grid gap-4 p-6">
                    <h2 className="text-lg font-bold text-[#222222]">Registrar nuevo incidente</h2>
                    <Field label="Descripción del evento">
                      <TextArea value={newIncident.desc} onChange={(e) => setNewIncident({ ...newIncident, desc: e.target.value })} rows={3} placeholder="¿Qué ocurrió? Describe brevemente el incidente..." />
                    </Field>
                    <Field label="Herramienta / sistema involucrado">
                      <TextInput value={newIncident.tool} onChange={(e) => setNewIncident({ ...newIncident, tool: e.target.value })} placeholder="Ej. ChatGPT, GPT interno de ventas..." maxLength={120} />
                    </Field>
                    <Field label="Tipo de datos involucrados">
                      <SelectInput value={newIncident.data} onChange={(e) => setNewIncident({ ...newIncident, data: e.target.value })}>
                        {["No aplica", "Datos internos", "Datos confidenciales", "Datos personales", "Datos críticos"].map((d) => <option key={d}>{d}</option>)}
                      </SelectInput>
                    </Field>
                    <Field label="Severidad">
                      <SelectInput value={newIncident.severity} onChange={(e) => setNewIncident({ ...newIncident, severity: e.target.value })}>
                        {["Menor", "Significativo", "Grave", "Crítico"].map((s) => <option key={s}>{s}</option>)}
                      </SelectInput>
                    </Field>
                    <Field label="Estado actual">
                      <SelectInput value={newIncident.status} onChange={(e) => setNewIncident({ ...newIncident, status: e.target.value })}>
                        {["Detectado", "En contención", "En investigación", "Remediado", "Cerrado"].map((s) => <option key={s}>{s}</option>)}
                      </SelectInput>
                    </Field>
                    <Field label="Fecha de detección">
                      <TextInput value={newIncident.date} onChange={(e) => setNewIncident({ ...newIncident, date: e.target.value })} placeholder="DD/MM/AAAA" maxLength={20} />
                    </Field>
                    <AppButton onClick={addIncident} disabled={!newIncident.desc.trim()}>+ Registrar incidente</AppButton>
                  </div>
                </Card>
                <Card>
                  <div className="p-6">
                    <h2 className="mb-4 text-xl font-bold text-[#222222]">Incidentes registrados ({incidents.length})</h2>
                    {incidents.length === 0 ? (
                      <div className="rounded-2xl border border-[#e5e5e5] p-8 text-center text-sm text-[#757575]">
                        Sin incidentes registrados. Si ocurre uno, documéntalo aquí para aprender y mejorar los controles.
                      </div>
                    ) : (
                      <div className="space-y-3">
                        {incidents.map((inc) => {
                          const sevColor = { Menor: "border-blue-200 bg-blue-50 text-blue-700", Significativo: "border-amber-200 bg-amber-50 text-amber-700", Grave: "border-orange-200 bg-orange-50 text-orange-700", Crítico: "border-red-200 bg-red-50 text-red-700" };
                          const stColor = { Detectado: "text-red-600", "En contención": "text-orange-600", "En investigación": "text-amber-600", Remediado: "text-blue-600", Cerrado: "text-emerald-600" };
                          return (
                            <div key={inc.id} className="rounded-2xl border border-[#e5e5e5] p-4">
                              <div className="flex items-start justify-between gap-3">
                                <div className="flex-1">
                                  <p className="text-sm font-semibold text-[#222222]">{inc.desc}</p>
                                  <p className="mt-1 text-xs text-[#757575]">{inc.tool && `${inc.tool} · `}{inc.data} · {inc.date}</p>
                                </div>
                                <Badge className={sevColor[inc.severity] || "border-gray-200 bg-gray-50 text-gray-700"}>{inc.severity}</Badge>
                              </div>
                              <p className={`mt-2 text-xs font-semibold ${stColor[inc.status] || "text-gray-600"}`}>Estado: {inc.status}</p>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </Card>
              </div>
              <div className="mt-5 flex items-center justify-between rounded-[24px] border border-[#e5e5e5] bg-[#fafafa] p-5">
                <div>
                  <p className="font-semibold text-[#222222]">¿Tienes el protocolo de incidentes activo?</p>
                  <p className="text-sm text-[#555555]">Genera el protocolo completo para que tu equipo sepa qué hacer ante cualquier incidente.</p>
                </div>
                <AppButton onClick={() => openDocViewer("Protocolo de incidentes")}>Generar protocolo →</AppButton>
              </div>
            </Section>
          )}

          {/* ── PANEL DE CUMPLIMIENTO ─────────────────────────── */}
          {active === "cumplimiento" && (() => {
            const checks = [
              { label: "Diagnóstico de organización completado", done: !!org.name, action: () => setActive("diagnostico"), weight: 15 },
              { label: "Inventario de herramientas activo", done: org.tools.length > 0, action: () => setActive("inventario"), weight: 10 },
              { label: "Mínimo 1 caso de uso registrado", done: useCases.length > 0, action: () => setActive("casos"), weight: 15 },
              { label: "Responsable de IA nombrado", done: !!roles.responsable, action: () => setActive("roles"), weight: 25 },
              { label: "Flujos de aprobación definidos", done: !!(roles["aprobacion_Bajo"] && roles["aprobacion_Medio"]), action: () => setActive("aprobaciones"), weight: 15 },
              { label: "Política de datos documentada", done: Object.keys(dataPolicy).filter((k) => k.endsWith("_notas")).some((k) => !!dataPolicy[k]) || !!dataPolicy.notas, action: () => setActive("datosPolitica"), weight: 10 },
              { label: "GPTs internos registrados", done: gpts.length > 0 || !org.tools.includes("GPT interno"), action: () => setActive("gpts"), weight: 5 },
              { label: "Al menos 1 incidente analizado", done: incidents.length > 0, action: () => setActive("incidentes"), weight: 5 },
            ];
            const totalWeight = checks.reduce((s, c) => s + c.weight, 0);
            const earnedWeight = checks.filter((c) => c.done).reduce((s, c) => s + c.weight, 0);
            const compScore = Math.round((earnedWeight / totalWeight) * 100);
            const compLabel = compScore >= 80 ? "Sólida" : compScore >= 60 ? "En construcción" : compScore >= 40 ? "Básica" : "Inicial";
            return (
              <Section title="Panel de cumplimiento" subtitle="Estado consolidado de tu gobernanza de IA — qué está hecho, qué falta y por dónde continuar.">
                <InfoBlock
                  icon="◪"
                  what="Un dashboard de madurez que muestra el avance en cada dimensión de la gobernanza, con el peso relativo de cada elemento."
                  why="No todas las organizaciones necesitan el 100% desde el inicio. Este panel ayuda a priorizar los elementos de mayor impacto y a comunicar el avance a la dirección."
                  how="Revisa qué elementos están completos y cuáles requieren atención. Haz clic en cualquier elemento pendiente para ir directamente al módulo correspondiente."
                />
                <div className="mb-5 grid gap-4 md:grid-cols-3">
                  <Card>
                    <div className="p-6 text-center">
                      <p className="text-sm font-semibold text-[#757575]">Índice de cumplimiento</p>
                      <p className="mt-2 text-5xl font-bold text-[#b00020]">{compScore}%</p>
                      <p className="mt-1 text-sm font-semibold text-[#333333]">{compLabel}</p>
                      <div className="mt-3 h-2 rounded-full bg-[#e5e5e5]">
                        <div className="h-2 rounded-full bg-[#b00020] transition-all duration-500" style={{ width: `${compScore}%` }} />
                      </div>
                    </div>
                  </Card>
                  <Card className="col-span-2">
                    <div className="p-6">
                      <h2 className="mb-3 text-lg font-bold text-[#222222]">Resumen ejecutivo</h2>
                      <div className="grid grid-cols-2 gap-3 text-sm">
                        <div className="rounded-2xl border border-emerald-100 bg-emerald-50 p-3 text-center">
                          <p className="text-2xl font-bold text-emerald-700">{checks.filter((c) => c.done).length}</p>
                          <p className="text-emerald-700">elementos completados</p>
                        </div>
                        <div className="rounded-2xl border border-[#b00020]/20 bg-[#fff5f6] p-3 text-center">
                          <p className="text-2xl font-bold text-[#b00020]">{checks.filter((c) => !c.done).length}</p>
                          <p className="text-[#b00020]">pendientes</p>
                        </div>
                      </div>
                    </div>
                  </Card>
                </div>
                <Card>
                  <div className="p-6">
                    <h2 className="mb-4 text-lg font-bold text-[#222222]">Checklist de gobernanza</h2>
                    <div className="space-y-3">
                      {checks.map((c, i) => (
                        <div
                          key={i}
                          onClick={() => !c.done && c.action()}
                          className={cn("flex cursor-pointer items-center gap-4 rounded-2xl border p-4 transition",
                            c.done ? "border-emerald-200 bg-emerald-50" : "border-[#e5e5e5] bg-white hover:bg-[#fff5f6]")}>
                          <div className={cn("flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-sm font-bold",
                            c.done ? "bg-emerald-500 text-white" : "border-2 border-[#e5e5e5] text-[#aaaaaa]")}>
                            {c.done ? "✓" : "○"}
                          </div>
                          <div className="flex-1">
                            <p className={cn("font-semibold", c.done ? "text-emerald-800" : "text-[#333333]")}>{c.label}</p>
                            {!c.done && <p className="text-xs text-[#b00020]">Clic para completar →</p>}
                          </div>
                          <span className="text-xs text-[#757575]">{c.weight} pts</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </Card>
                {checks.some((c) => !c.done) && (
                  <Card className="mt-5 border-amber-200 bg-amber-50">
                    <div className="p-5">
                      <h2 className="mb-3 font-bold text-amber-800">Próximos pasos recomendados</h2>
                      <div className="space-y-2">
                        {checks.filter((c) => !c.done).map((c, i) => (
                          <button key={i} onClick={c.action} className="flex w-full items-center gap-3 rounded-xl bg-white p-3 text-left transition hover:bg-amber-100">
                            <span className="font-bold text-amber-600">{i + 1}.</span>
                            <span className="text-sm text-[#333333]">{c.label}</span>
                            <span className="ml-auto text-xs font-semibold text-[#b00020]">→</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  </Card>
                )}
                <div className="mt-5 flex items-center justify-between rounded-[24px] border border-[#e5e5e5] bg-[#fafafa] p-5">
                  <div>
                    <p className="font-semibold text-[#222222]">¿Quieres reportar el estado a dirección?</p>
                    <p className="text-sm text-[#555555]">Genera el informe ejecutivo con el estado actual de la gobernanza.</p>
                  </div>
                  <AppButton onClick={() => openDocViewer("Informe ejecutivo para dirección")}>Generar informe ejecutivo →</AppButton>
                </div>
              </Section>
            );
          })()}

        </main>
      </div>
    </div>
  );
}

      ReactDOM.createRoot(document.getElementById('root')).render(<React.StrictMode><App /></React.StrictMode>);
    </script>
  </body>
</html>
